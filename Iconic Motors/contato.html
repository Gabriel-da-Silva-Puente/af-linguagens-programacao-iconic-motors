<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iconic Motors - Contato</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
    <nav class="menu">
        <div id="logo">
            <img src="./img/logo.png" alt="Iconic Motors Logo">
        </div>

        <div class="menu-links">
            <a href="index.html">Home</a>
            <a href="galeria.html">Galeria</a>
            <a href="contato.html">Contato</a>
        </div>
    </nav>
</header>

<main>

    <section class="apresentacao">
        <h1>Contato</h1>
        <p>Entre em contato com a equipe da Iconic Motors.</p>
    </section>

    <section class="container mb-5">

        <form id="formContato">

    <label for="nome">Nome completo:</label>
    <input type="text" id="nome" required>

    <label for="email">E-mail:</label>
    <input type="email" id="email" required>

    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" placeholder="(00) 00000-0000">

    <label for="assunto">Assunto:</label>
    <input type="text" id="assunto" required>

    <label for="mensagem">Mensagem:</label>
    <textarea id="mensagem" rows="5" required></textarea>

    <div class="botoes-form">
        <button type="submit" class="btn">Enviar</button>
        <button type="reset" class="btn btn-limpar">Limpar</button>
    </div>

</form>

    </section>

    <section class="container mb-5 text-center">
        <h2 style="color: var(--destaque);">Nossa localização</h2>
        <p>Av. Iconic Motors, 250 - São Paulo/SP</p>

        <iframe
            src="https://www.google.com/maps?q=São%20Paulo%20SP&output=embed"
            width="100%"
            height="250"
            style="border:0; border-radius:10px;"
            allowfullscreen=""
            loading="lazy">
        </iframe>
    </section>

</main>

<footer class="footer">
    <p>© 2026 Iconic Motors. Legends from street.</p>
    <p>Designed by Gabriel e Guilherme.</p>
</footer>

<button id="btnTopo" class="btn-topo">↑</button>

<script src="./js/script.js"></script>
</body>
</html>
